<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Dashboard – Zinnia Pillar Quest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { primary: '#3B82F6', secondary: '#22C55E', danger: '#EF4444' } } } }</script>
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-900 via-blue-900 to-purple-900 p-6">

  <div class="max-w-7xl mx-auto">

    <!-- Header + Timer -->
    <div class="text-center mb-8">
      <h1 class="text-5xl font-bold text-white mb-4">Live Dashboard</h1>

      <div id="phase-live" class="hidden inline-block bg-white rounded-2xl px-12 py-6 shadow-2xl">
        <p class="text-sm text-gray-500 mb-1">Time Remaining</p>
        <p id="timer-display" class="text-7xl font-bold text-primary">5:00</p>
      </div>
      <div id="phase-lobby" class="hidden inline-block bg-yellow-100 text-yellow-800 px-8 py-4 rounded-xl text-xl font-semibold">
        Game Not Started
      </div>
      <div id="phase-ended" class="hidden inline-block bg-red-100 text-red-800 px-8 py-4 rounded-xl text-xl font-semibold">
        Game Ended
      </div>
    </div>

    <!-- Level Panels -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
      <!-- L1 Teams -->
      <div class="bg-white rounded-xl shadow-lg p-4">
        <div class="flex items-center justify-between mb-3">
          <h3 class="font-bold text-gray-900">🤝 Level 1: Team Up</h3>
          <span id="l1-count" class="text-2xl font-bold text-purple-600">0</span>
        </div>
        <div id="l1-list" class="space-y-1 max-h-40 overflow-y-auto">
          <p class="text-xs text-gray-400 text-center py-3">None yet</p>
        </div>
      </div>
      <!-- L2 Players -->
      <div class="bg-white rounded-xl shadow-lg p-4">
        <div class="flex items-center justify-between mb-3">
          <h3 class="font-bold text-gray-900">⚡ Level 2: Be Bold</h3>
          <span id="l2-count" class="text-2xl font-bold text-blue-600">0</span>
        </div>
        <div id="l2-list" class="space-y-1 max-h-40 overflow-y-auto">
          <p class="text-xs text-gray-400 text-center py-3">None yet</p>
        </div>
      </div>
      <!-- L3 Players -->
      <div class="bg-white rounded-xl shadow-lg p-4">
        <div class="flex items-center justify-between mb-3">
          <h3 class="font-bold text-gray-900">🎯 Level 3: Deliver Value</h3>
          <span id="l3-count" class="text-2xl font-bold text-orange-600">0</span>
        </div>
        <div id="l3-list" class="space-y-1 max-h-40 overflow-y-auto">
          <p class="text-xs text-gray-400 text-center py-3">None yet</p>
        </div>
      </div>
      <!-- Finished -->
      <div class="bg-white rounded-xl shadow-lg p-4">
        <div class="flex items-center justify-between mb-3">
          <h3 class="font-bold text-gray-900">✅ Finished</h3>
          <span id="fin-count" class="text-2xl font-bold text-green-600">0</span>
        </div>
        <div id="fin-list" class="space-y-1 max-h-40 overflow-y-auto">
          <p class="text-xs text-gray-400 text-center py-3">None yet</p>
        </div>
      </div>
    </div>

    <!-- Leaderboard + Activity -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <!-- Leaderboard -->
      <div class="lg:col-span-2 bg-white rounded-xl shadow-lg overflow-hidden">
        <div class="bg-gradient-to-r from-blue-600 to-purple-600 p-4">
          <h2 class="text-2xl font-bold text-white">Leaderboard</h2>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Rank</th>
                <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Player</th>
                <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Team</th>
                <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Level</th>
                <th class="px-4 py-3 text-right text-xs font-semibold text-gray-500 uppercase">Score</th>
              </tr>
            </thead>
            <tbody id="leaderboard-body" class="divide-y divide-gray-200">
              <tr><td colspan="5" class="px-4 py-8 text-center text-gray-400">No players yet</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Activity Feed -->
      <div class="bg-white rounded-xl shadow-lg p-6">
        <h2 class="text-2xl font-bold text-gray-900 mb-4">Activity Feed</h2>
        <div id="activity-list" class="space-y-2 max-h-80 overflow-y-auto">
          <p class="text-gray-400 text-center py-8">No activity yet</p>
        </div>
      </div>

    </div>
  </div>

  <script type="module">
    import { subscribeGameState, subscribePlayers, subscribeTeams, subscribeActivity, computeLeaderboard } from './js/queries.js';
    import { updateDoc, doc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';
    import { db } from './js/firebase-config.js';
    import { formatTime } from './js/utils.js';

    let gameState = null, players = [], teams = [];
    let timerInterval = null;

    // ── Subscribe to all live data ─────────────────────────────────────────────
    subscribeGameState(gs => {
      gameState = gs;
      renderPhase();
      startTimer();
    });

    subscribePlayers(ps => { players = ps; renderPanels(); renderLeaderboard(); });
    subscribeTeams(ts => { teams = ts; renderPanels(); renderLeaderboard(); });
    subscribeActivity(acts => renderActivity(acts));

    // ── Phase Display ──────────────────────────────────────────────────────────
    function renderPhase() {
      ['phase-live','phase-lobby','phase-ended'].forEach(id =>
        document.getElementById(id).classList.add('hidden'));
      const phase = gameState?.phase;
      if (phase === 'live') document.getElementById('phase-live').classList.remove('hidden');
      else if (phase === 'ended') document.getElementById('phase-ended').classList.remove('hidden');
      else document.getElementById('phase-lobby').classList.remove('hidden');
    }

    // ── Timer ──────────────────────────────────────────────────────────────────
    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);
      if (gameState?.phase !== 'live' || !gameState.gameEndTime) return;

      timerInterval = setInterval(async () => {
        const now = Date.now();
        const end = gameState.gameEndTime.toMillis();
        const remaining = Math.max(0, Math.floor((end - now) / 1000));
        const display = document.getElementById('timer-display');
        display.textContent = formatTime(remaining);
        display.className = `text-7xl font-bold ${remaining < 60 ? 'text-red-500' : 'text-primary'}`;

        if (remaining === 0) {
          clearInterval(timerInterval);
          try {
            await updateDoc(doc(db, 'gameState', 'current'), { phase: 'ended', updatedAt: serverTimestamp() });
          } catch (e) { console.error(e); }
        }
      }, 1000);
    }

    // ── Level Panels ───────────────────────────────────────────────────────────
    function renderPanels() {
      const l1Teams = teams.filter(t => t.currentLevel === 1);
      const l2Ps    = players.filter(p => p.currentLevel === 2);
      const l3Ps    = players.filter(p => p.currentLevel === 3);
      const finPs   = players.filter(p => p.currentLevel === 'finished');

      setPanelTeams('l1', l1Teams);
      setPanelPlayers('l2', l2Ps);
      setPanelPlayers('l3', l3Ps);
      setPanelPlayers('fin', finPs);
    }

    function setPanelTeams(prefix, items) {
      document.getElementById(`${prefix}-count`).textContent = items.length;
      document.getElementById(`${prefix}-list`).innerHTML = items.length
        ? items.map(t => `<div class="text-sm p-2 bg-gray-50 rounded text-gray-700">${t.teamName} <span class="text-gray-400 text-xs">(${t.memberIds.length} members)</span></div>`).join('')
        : '<p class="text-xs text-gray-400 text-center py-3">None yet</p>';
    }

    function setPanelPlayers(prefix, items) {
      document.getElementById(`${prefix}-count`).textContent = items.length;
      document.getElementById(`${prefix}-list`).innerHTML = items.length
        ? items.map(p => `<div class="text-sm p-2 bg-gray-50 rounded text-gray-700">${p.name}</div>`).join('')
        : '<p class="text-xs text-gray-400 text-center py-3">None yet</p>';
    }

    // ── Leaderboard ────────────────────────────────────────────────────────────
    function renderLeaderboard() {
      const entries = computeLeaderboard(players, teams).slice(0, 10);
      const tbody = document.getElementById('leaderboard-body');
      if (!entries.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-8 text-center text-gray-400">No players yet</td></tr>';
        return;
      }
      const medals = ['🥇','🥈','🥉'];
      tbody.innerHTML = entries.map((e, i) => `
        <tr class="${i < 3 ? 'bg-yellow-50' : 'hover:bg-gray-50'}">
          <td class="px-4 py-3 font-bold ${i === 0 ? 'text-yellow-500 text-xl' : i === 1 ? 'text-gray-400' : i === 2 ? 'text-orange-500' : 'text-gray-600'}">
            ${medals[i] || i + 1}
          </td>
          <td class="px-4 py-3 font-medium text-gray-900">${e.name}</td>
          <td class="px-4 py-3 text-gray-500 text-sm">${e.teamName}</td>
          <td class="px-4 py-3">
            <span class="inline-block px-2 py-1 text-xs font-semibold rounded-full ${
              e.level === 'finished' ? 'bg-green-100 text-green-800' :
              e.level === 3 ? 'bg-blue-100 text-blue-800' :
              e.level === 2 ? 'bg-purple-100 text-purple-800' :
              'bg-gray-100 text-gray-700'}">
              ${e.level === 'finished' ? 'Done' : 'L' + e.level}
            </span>
          </td>
          <td class="px-4 py-3 text-right font-bold text-lg text-gray-900">${e.score}</td>
        </tr>`).join('');
    }

    // ── Activity Feed ──────────────────────────────────────────────────────────
    function renderActivity(activities) {
      const el = document.getElementById('activity-list');
      if (!activities.length) {
        el.innerHTML = '<p class="text-gray-400 text-center py-8">No activity yet</p>';
        return;
      }
      el.innerHTML = activities.map(a =>
        `<div class="p-3 bg-gray-50 rounded-lg text-sm text-gray-700 border-l-4 border-primary">${a.message}</div>`
      ).join('');
    }
  </script>
</body>
</html>
