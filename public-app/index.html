<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zinnia Pillar Quest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { primary: '#3B82F6', secondary: '#22C55E', danger: '#EF4444' } } } }</script>
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-500 via-purple-500 to-pink-500 flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-5xl font-bold text-white mb-2">Zinnia Pillar Quest</h1>
      <p class="text-blue-100">Strong Pillars. Stronger Guessing Skills 🤪</p>
    </div>

    <div class="bg-white rounded-xl shadow-2xl overflow-hidden">
      <!-- Tabs -->
      <div class="flex border-b border-gray-200">
        <button id="tab-create" onclick="switchTab('create')"
          class="flex-1 py-4 font-semibold transition-colors bg-primary text-white">
          Create Team
        </button>
        <button id="tab-join" onclick="switchTab('join')"
          class="flex-1 py-4 font-semibold transition-colors bg-gray-50 text-gray-600 hover:bg-gray-100">
          Join Team
        </button>
      </div>

      <div class="p-6">
        <!-- Create Team Form -->
        <div id="form-create">
          <form onsubmit="handleCreate(event)" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Team Name</label>
              <input id="create-team-name" type="text" required placeholder="Enter team name"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Your Name</label>
              <input id="create-player-name" type="text" required placeholder="Enter your name"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none" />
            </div>
            <p id="create-error" class="text-red-500 text-sm hidden"></p>
            <button type="submit" id="create-btn"
              class="w-full bg-primary text-white py-3 rounded-lg font-semibold hover:bg-blue-600 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
              Create Team
            </button>
          </form>
        </div>

        <!-- Join Team Form -->
        <div id="form-join" class="hidden">
          <form onsubmit="handleJoin(event)" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Your Name</label>
              <input id="join-player-name" type="text" required placeholder="Enter your name"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent outline-none" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Team Code</label>
              <input id="join-team-code" type="text" required placeholder="Enter team code" maxlength="6"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent outline-none uppercase tracking-widest"
                oninput="this.value = this.value.toUpperCase()" />
            </div>
            <p id="join-error" class="text-red-500 text-sm hidden"></p>
            <button type="submit" id="join-btn"
              class="w-full bg-secondary text-white py-3 rounded-lg font-semibold hover:bg-green-600 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
              Join Team
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { createTeam, joinTeam, initializeGameState } from './js/game.js';

    window.switchTab = function(tab) {
      const isCreate = tab === 'create';
      document.getElementById('form-create').classList.toggle('hidden', !isCreate);
      document.getElementById('form-join').classList.toggle('hidden', isCreate);
      document.getElementById('tab-create').className = `flex-1 py-4 font-semibold transition-colors ${isCreate ? 'bg-primary text-white' : 'bg-gray-50 text-gray-600 hover:bg-gray-100'}`;
      document.getElementById('tab-join').className = `flex-1 py-4 font-semibold transition-colors ${!isCreate ? 'bg-secondary text-white' : 'bg-gray-50 text-gray-600 hover:bg-gray-100'}`;
    };

    function setLoading(btnId, loading, defaultText) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.textContent = loading ? 'Please wait...' : defaultText;
    }

    window.handleCreate = async function(e) {
      e.preventDefault();
      const teamName = document.getElementById('create-team-name').value.trim();
      const playerName = document.getElementById('create-player-name').value.trim();
      const errEl = document.getElementById('create-error');
      errEl.classList.add('hidden');
      if (!teamName || !playerName) return;
      setLoading('create-btn', true, 'Create Team');
      try {
        const { team, player } = await createTeam(teamName, playerName);
        localStorage.setItem('playerId', player.playerId);
        localStorage.setItem('teamId', team.teamId);
        window.location.href = 'play.html';
      } catch (err) {
        errEl.textContent = err.message || 'Failed to create team';
        errEl.classList.remove('hidden');
        setLoading('create-btn', false, 'Create Team');
      }
    };

    window.handleJoin = async function(e) {
      e.preventDefault();
      const playerName = document.getElementById('join-player-name').value.trim();
      const teamCode = document.getElementById('join-team-code').value.trim();
      const errEl = document.getElementById('join-error');
      errEl.classList.add('hidden');
      if (!playerName || !teamCode) return;
      setLoading('join-btn', true, 'Join Team');
      try {
        const { team, player } = await joinTeam(playerName, teamCode);
        localStorage.setItem('playerId', player.playerId);
        localStorage.setItem('teamId', team.teamId);
        window.location.href = 'play.html';
      } catch (err) {
        errEl.textContent = err.message || 'Failed to join team';
        errEl.classList.remove('hidden');
        setLoading('join-btn', false, 'Join Team');
      }
    };

    // Initialize game state on load
    initializeGameState().catch(console.error);
  </script>
</body>
</html>
